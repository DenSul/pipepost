# PipePost flow: Weekly Digest → Telegram  
# Replaces: pipeline run weekly-digest (ai-craft-pipeline)
# Custom flow: weekly summary from AI Craft API → Telegram

sources:
  - name: weekly-search
    type: search
    queries:
      - "site:denishub.dev"

translate:
  model: openai/deepseek-reasoner
  target_lang: ru

destination:
  type: telegram
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

flow:
  steps: [scout, adapt, publish]
  adapt:
    style: telegram
  storage:
    db_path: /root/.ocplatform/workspace/pipepost/pipepost.db

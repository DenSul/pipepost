# PipePost flow: Scout candidates → AI Craft import queue
# Replaces: pipeline run scout (ai-craft-pipeline)

sources:
  - name: hackernews
    type: hackernews
    min_score: 80
  - name: reddit-dev
    type: reddit
    subreddits:
      - programming
      - rust
      - golang
      - webdev
      - devops
    min_score: 100
  - name: tech-search
    type: search
    queries:
      - "latest tech articles programming"
      - "open source project releases"

translate:
  model: openai/deepseek-reasoner
  target_lang: ru

destination:
  type: webhook
  url: http://localhost:8000/api/import-queue
  headers:
    Content-Type: "application/json"

flow:
  steps: [dedup, scout, filter, score, post_publish]
  filter:
    keywords_exclude: ["hiring", "resume", "salary"]
    min_title_length: 15
  score:
    niche: tech
    max_score_candidates: 20
  storage:
    db_path: /root/.openclaw/workspace/pipepost/pipepost.db

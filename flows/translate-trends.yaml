# PipePost flow: Translate GitHub Trends descriptions
# Replaces: pipeline translate trends (ai-craft-pipeline)

sources:
  - name: gh-trends-search
    type: search
    queries:
      - "github trending repositories today"

translate:
  model: openai/deepseek-reasoner
  target_lang: ru

destination:
  type: webhook
  url: http://localhost:8000/api/github-trends/bulk
  method: PATCH
  headers:
    Content-Type: "application/json"

flow:
  steps: [dedup, scout, translate, post_publish]
  storage:
    db_path: /root/.openclaw/workspace/pipepost/pipepost.db

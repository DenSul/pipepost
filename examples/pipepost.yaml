# PipePost configuration example
# Copy to project root as pipepost.yaml or set PIPEPOST_CONFIG env var

# Content sources — where to find articles
sources:
  # HackerNews top stories
  - name: hackernews
    type: hackernews
    min_score: 100

  # Reddit — subreddits must be specified (no hardcoded defaults)
  - name: reddit-cooking
    type: reddit
    subreddits:
      - cooking
      - recipes
      - AskCulinary
    min_score: 100

  - name: reddit-finance
    type: reddit
    subreddits:
      - personalfinance
      - investing
      - economics
    min_score: 200

  # RSS/Atom feed
  - name: my-blog
    type: rss
    url: https://example.com/feed.xml
    max_items: 10

  # DuckDuckGo search — cooking niche
  - name: cooking-search
    type: search
    queries:
      - "best seasonal recipes 2026"
      - "cooking techniques masterclass"

  # DuckDuckGo search — travel niche
  - name: travel-search
    type: search
    queries:
      - "hidden travel destinations Europe"
      - "budget travel tips"

  # DuckDuckGo search — finance niche
  - name: finance-search
    type: search
    queries:
      - "stock market analysis"
      - "personal finance strategies"

  # DuckDuckGo search — health niche
  - name: health-search
    type: search
    queries:
      - "health research breakthroughs"
      - "nutrition science news"

  # DuckDuckGo search — tech niche
  - name: tech-search
    type: search
    queries:
      - "latest AI research papers"
      - "open source projects trending"

# Publish destination
destination:
  # Options: webhook, markdown
  type: webhook
  url: https://myblog.com/api/posts/auto-publish
  headers:
    Authorization: "Bearer your-token-here"
    Content-Type: "application/json"

  # For markdown output:
  # type: markdown
  # output_dir: ./output

# Translation settings
translate:
  # Any LiteLLM-supported model
  model: deepseek/deepseek-chat
  target_lang: ru
  max_tokens: 16384
  min_ratio: 0.5

# Fetch settings
fetch:
  max_chars: 20000
  timeout: 30.0

# Validation settings
validate:
  min_content_len: 300
  min_ratio: 0.3

# Debug mode
verbose: false

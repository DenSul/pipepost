target-version = "py311"
line-length = 100

[lint]
select = [
    "F",      # pyflakes
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "ANN",    # flake8-annotations
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "PIE",    # flake8-pie
    "PT",     # flake8-pytest-style
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SLF",    # flake8-self
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib
    "RUF",    # ruff-specific rules
]
ignore = [
    "ANN401",  # dynamically typed expressions (Any) — allow where justified
    "ISC001",  # conflicts with formatter
]

[lint.isort]
known-first-party = ["pipepost"]
force-single-line = false
lines-after-imports = 2

[lint.per-file-ignores]
"tests/**/*.py" = ["ANN", "ARG", "SLF", "RUF001"]
"pipepost/destinations/markdown.py" = ["RUF001"]  # Cyrillic transliteration map
"pipepost/utils/slug.py" = ["RUF001"]  # Cyrillic transliteration map
"examples/**/*.py" = ["ANN", "E501", "F541", "I001", "SLF"]  # demo scripts

[format]
quote-style = "double"
indent-style = "space"

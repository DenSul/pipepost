<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 790" width="720" height="790">
<style>
  @font-face { font-family: "mono"; src: local("SF Mono"), local("Menlo"), local("Consolas"), local("DejaVu Sans Mono"); }
  .terminal { font-family: mono, monospace; font-size: 14px; }
  .line { opacity: 0; animation: fadeIn 0.15s ease-in forwards; }
  @keyframes fadeIn { to { opacity: 1; } }
</style>
<rect width="720" height="790" rx="8" fill="#282a36"/>
<circle cx="20" cy="16" r="6" fill="#ff5555"/>
<circle cx="40" cy="16" r="6" fill="#f1fa8c"/>
<circle cx="60" cy="16" r="6" fill="#50fa7b"/>
<text x="360" y="20" text-anchor="middle" fill="#f8f8f2" font-family="mono, monospace" font-size="12">pipepost demo</text>
<g class="terminal">
  <text x="16" y="50" fill="#8be9fd" class="line" style="animation-delay: 0.00s">$ pipepost run default --source hackernews --batch -n 3 --lang ru</text>
  <text x="16" y="70" fill="#bd93f9" class="line" style="animation-delay: 0.88s"></text>
  <text x="16" y="90" fill="#bd93f9" class="line" style="animation-delay: 0.96s">  💾  Dedup  loading published URLs</text>

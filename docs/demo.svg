  <text x="16" y="130" fill="#bd93f9" class="line" style="animation-delay: 1.72s"></text>
  <text x="16" y="150" fill="#bd93f9" class="line" style="animation-delay: 1.80s">  📡  Scout  HackerNews top stories</text>
  <text x="16" y="170" fill="#6272a4" class="line" style="animation-delay: 1.88s">     5 candidates in 1.2s</text>
  <text x="16" y="190" fill="#f8f8f2" class="line" style="animation-delay: 1.96s">     &gt; [33m  453[0m  The threat is comfortable drift toward not understanding</text>
  <text x="16" y="210" fill="#f8f8f2" class="line" style="animation-delay: 2.04s">     &gt; [33m  274[0m  A Claude Code skill that makes Claude talk like a caveman</text>
  <text x="16" y="230" fill="#f8f8f2" class="line" style="animation-delay: 2.12s">     &gt; [33m  215[0m  Someone at BrowserStack is leaking users&#x27; email address</text>
  <text x="16" y="250" fill="#bd93f9" class="line" style="animation-delay: 2.70s"></text>
  <text x="16" y="270" fill="#bd93f9" class="line" style="animation-delay: 2.78s">  📥  Fetch  downloading articles</text>
  <text x="16" y="290" fill="#6272a4" class="line" style="animation-delay: 2.86s">     [1] The threat is comfortable drift... (8,421 chars)</text>
  <text x="16" y="310" fill="#6272a4" class="line" style="animation-delay: 2.94s">     [2] A Claude Code skill... (4,134 chars)</text>
  <text x="16" y="330" fill="#6272a4" class="line" style="animation-delay: 3.02s">     [3] Someone at BrowserStack... (3,890 chars)</text>
  <text x="16" y="350" fill="#6272a4" class="line" style="animation-delay: 3.10s">     Formatting: headings=True code=True links=True images=True</text>
  <text x="16" y="370" fill="#bd93f9" class="line" style="animation-delay: 3.68s"></text>
  <text x="16" y="390" fill="#bd93f9" class="line" style="animation-delay: 3.76s">  🌍  Translate  via deepseek-reasoner</text>
  <text x="16" y="410" fill="#6272a4" class="line" style="animation-delay: 3.84s">     Translating 3 articles...</text>
  <text x="16" y="430" fill="#50fa7b" class="line" style="animation-delay: 6.92s">     [1] &quot;Угроза — комфортный дрейф к непониманию&quot;</text>
  <text x="16" y="450" fill="#50fa7b" class="line" style="animation-delay: 7.00s">     [2] &quot;Навык Claude Code: говори как пещерный человек&quot;</text>
  <text x="16" y="470" fill="#50fa7b" class="line" style="animation-delay: 7.08s">     [3] &quot;Утечка email-адресов в BrowserStack&quot;</text>
  <text x="16" y="490" fill="#6272a4" class="line" style="animation-delay: 7.16s">     Done in 14.2s</text>
  <text x="16" y="510" fill="#bd93f9" class="line" style="animation-delay: 7.64s"></text>
  <text x="16" y="530" fill="#bd93f9" class="line" style="animation-delay: 7.72s">  ✅  Validate  quality checks</text>
  <text x="16" y="550" fill="#6272a4" class="line" style="animation-delay: 7.80s">     3/3 passed (ratio &gt; 80%, length &gt; 200 chars)</text>
  <text x="16" y="570" fill="#bd93f9" class="line" style="animation-delay: 8.28s"></text>
  <text x="16" y="590" fill="#bd93f9" class="line" style="animation-delay: 8.36s">  📝  Publish  saving markdown files</text>
  <text x="16" y="610" fill="#50fa7b" class="line" style="animation-delay: 8.44s">     [1] 2026-04-05-ugroza-komfortnyy-dreyf  ✓</text>
  <text x="16" y="630" fill="#50fa7b" class="line" style="animation-delay: 8.52s">     [2] 2026-04-05-navyk-claude-code        ✓</text>
  <text x="16" y="650" fill="#50fa7b" class="line" style="animation-delay: 8.60s">     [3] 2026-04-05-utechka-email-adresov    ✓</text>
  <text x="16" y="670" fill="#50fa7b" class="line" style="animation-delay: 9.18s"></text>
  <text x="16" y="690" fill="#50fa7b" class="line" style="animation-delay: 9.26s">  ══════════════════════════════════════════════════</text>
  <text x="16" y="710" fill="#50fa7b" class="line" style="animation-delay: 9.34s">  Pipeline complete! 3 articles published in 18.4s</text>
  <text x="16" y="730" fill="#50fa7b" class="line" style="animation-delay: 9.42s">  ══════════════════════════════════════════════════</text>
  <text x="16" y="750" fill="#6272a4" class="line" style="animation-delay: 9.50s"></text>
</g>
</svg>